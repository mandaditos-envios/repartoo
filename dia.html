<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PowerLog - Rutina</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen p-4 flex flex-col justify-start">

    <div class="space-y-6 w-full">
        <div class="flex items-center justify-between border-b-2 border-slate-200 pb-4">
            <button type="button" onclick="window.location.href='perfil.html'" class="text-base font-black text-slate-500 flex items-center gap-2 py-2">
                <i data-lucide="arrow-left" class="w-6 h-6"></i> Volver a días
            </button>
            <div class="text-right">
                <span id="txt-perfil-en-dia" class="text-[11px] text-slate-400 font-bold block">---</span>
                <h2 id="txt-dia-activo" class="text-2xl font-black text-slate-800">Día X</h2>
            </div>
        </div>

        <button type="button" onclick="abrirModal()" class="w-full bg-emerald-600 text-white font-black py-5 px-6 rounded-2xl text-lg flex items-center justify-center gap-2 shadow-md">
            <i data-lucide="plus-circle" class="w-6 h-6"></i> Agregar Ejercicio
        </button>

        <div class="space-y-4 w-full" id="bloque-ejercicios-lista"></div>

        <div class="bg-white border-2 border-slate-200 rounded-3xl p-5 space-y-4">
            <h4 class="text-xs font-black uppercase tracking-wider text-slate-400 flex items-center gap-1.5">
                <i data-lucide="activity" class="w-4 h-4 text-blue-500"></i> Volumen de Series Semanales Completadas
            </h4>
            <div id="panel-barras-musculos" class="space-y-3.5"></div>
        </div>
    </div>

    <div id="modal-ejercicio" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4 z-50" style="display: none;">
        <div class="bg-white rounded-3xl w-full max-w-sm p-6 space-y-5 shadow-2xl">
            <h3 class="text-xl font-black text-slate-800 border-b border-slate-100 pb-2">Nuevo Ejercicio</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase">Nombre</label>
                    <input type="text" id="input-nombre-ejercicio" placeholder="Ej. Press Inclinado" class="w-full bg-slate-50 border rounded-xl px-4 py-3.5 text-base font-bold text-slate-800">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase">Grupo Muscular</label>
                    <select id="select-grupo-muscular" class="w-full bg-slate-50 border rounded-xl px-3 py-3.5 text-base font-bold text-slate-600">
                        <option value="Pecho">Pecho (10-20 series)</option><option value="Espalda">Espalda (10-20 series)</option>
                        <option value="Hombros">Hombros (10-20 series)</option><option value="Bíceps">Bíceps (8-15 series)</option>
                        <option value="Tríceps">Tríceps (8-15 series)</option><option value="Cuádriceps">Cuádriceps (10-20 series)</option>
                        <option value="Femorales">Femorales (8-15 series)</option><option value="Gemelos">Gemelos (8-20 series)</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3 pt-2">
                <button type="button" onclick="cerrarModal()" class="bg-slate-100 text-slate-600 font-bold py-3.5 rounded-xl">Cancelar</button>
                <button type="button" onclick="crearEjercicio()" class="bg-blue-600 text-white font-bold py-3.5 rounded-xl">Guardar</button>
            </div>
        </div>
    </div>

    <script>
        const usuario = localStorage.getItem('usuario_actual');
        const dia = localStorage.getItem('dia_actual');
        const METAS = { "Pecho": 20, "Espalda": 20, "Hombros": 20, "Bíceps": 15, "Tríceps": 15, "Cuádriceps": 20, "Femorales": 15, "Gemelos": 20 };

        document.getElementById('txt-perfil-en-dia').innerText = usuario;
        document.getElementById('txt-dia-activo').innerText = `Día ${dia}`;

        let db = JSON.parse(localStorage.getItem('gym_step_by_step_db'));
        let historial = JSON.parse(localStorage.getItem('gym_logs_historial_v5')) || [];

        function abrirModal() { document.getElementById('modal-ejercicio').style.display = 'flex'; }
        function cerrarModal() { document.getElementById('modal-ejercicio').style.display = 'none'; }

        function crearEjercicio() {
            const nombre = document.getElementById('input-nombre-ejercicio').value.trim();
            const musculo = document.getElementById('select-grupo-muscular').value;
            if(!nombre) return;

            db[usuario].rutinas[dia].push({
                id: Date.now(), nombre: nombre, musculo: musculo,
                series: [{peso:'',reps:''},{peso:'',reps:''},{peso:'',reps:''},{peso:'',reps:''}]
            });
            localStorage.setItem('gym_step_by_step_db', JSON.stringify(db));
            cerrarModal();
            render();
        }

        function eliminarEjercicio(id) {
            db[usuario].rutinas[dia] = db[usuario].rutinas[dia].filter(e => e.id !== id);
            localStorage.setItem('gym_step_by_step_db', JSON.stringify(db));
            render();
        }

        function actualizarDato(idEj, idx, prop, val) {
            const ej = db[usuario].rutinas[dia].find(e => e.id === idEj);
            if(ej) {
                ej.series[idx][prop] = val;
                localStorage.setItem('gym_step_by_step_db', JSON.stringify(db));
                
                if(prop === 'reps') renderTags(idEj, idx, val);

                // Guardar Log Historial
                const s = ej.series[idx];
                if(s.peso || s.reps) {
                    const ahora = new Date();
                    const timestamp = `${ahora.toLocaleDateString('es-ES', {day:'2-digit',month:'2-digit'})} ${ahora.toLocaleTimeString('es-ES', {hour:'2-digit',minute:'2-digit'})}`;
                    const uid = `${usuario}-${ej.nombre}-${idx+1}`;
                    historial = historial.filter(h => h.uid !== uid);
                    historial.unshift({ uid, fecha: timestamp, usuario, ejercicio: ej.nombre, musculo: ej.musculo, peso: s.peso||'0', reps: s.reps||'0' });
                    localStorage.setItem('gym_logs_historial_v5', JSON.stringify(historial));
                }
                actualizarBarras();
            }
        }

        function renderTags(idEj, idx, val) {
            const tagContainer = document.getElementById(`tag-${idEj}-${idx}`);
            if(!tagContainer || !val) return;
            const r = parseInt(val);
            if(r < 6) tagContainer.innerHTML = '<span class="text-[11px] text-amber-700 font-black bg-amber-50 px-2 py-1 rounded-lg border border-amber-200">🔴 Pesado</span>';
            else if(r <= 12) tagContainer.innerHTML = '<span class="text-[11px] text-emerald-700 font-black bg-emerald-50 px-2 py-1 rounded-lg border border-emerald-200">🟢 Ideal</span>';
            else tagContainer.innerHTML = '<span class="text-[11px] text-blue-700 font-black bg-blue-50 px-2 py-1 rounded-lg border border-blue-200">🟡 Liviano</span>';
        }

        function render() {
            const container = document.getElementById('bloque-ejercicios-lista');
            container.innerHTML = '';
            const list = db[usuario].rutinas[dia] || [];

            if(list.length === 0) {
                container.innerHTML = `<div class="py-12 text-center border-2 border-dashed border-slate-200 rounded-3xl bg-white text-slate-400 font-semibold">No hay ejercicios agregados hoy.</div>`;
                actualizarBarras();
                return;
            }

            list.forEach(ej => {
                const div = document.createElement('div');
                div.className = "bg-white border-2 border-slate-200 rounded-3xl p-5 space-y-4 mb-3 w-full";
                let sHtml = '';
                ej.series.forEach((s, idx) => {
                    sHtml += `
                        <div class="grid grid-cols-12 gap-2 items-center">
                            <span class="col-span-1 text-base font-black text-slate-400 text-center">#${idx+1}</span>
                            <input type="text" placeholder="Peso" value="${s.peso}" oninput="actualizarDato(${ej.id}, ${idx}, 'peso', this.value)" class="col-span-3 bg-slate-50 border border-slate-300 rounded-xl py-3.5 text-center text-lg font-black text-slate-800">
                            <input type="number" placeholder="Reps" value="${s.reps}" oninput="actualizarDato(${ej.id}, ${idx}, 'reps', this.value)" class="col-span-3 bg-slate-50 border border-slate-300 rounded-xl py-3.5 text-center text-lg font-black text-slate-800">
                            <div id="tag-${ej.id}-${idx}" class="col-span-5 flex items-center justify-start pl-1"></div>
                        </div>`;
                });

                div.innerHTML = `
                    <div class="flex justify-between items-center border-b pb-3">
                        <div>
                            <h4 class="font-black text-xl text-slate-800">${ej.nombre}</h4>
                            <span class="text-xs bg-slate-100 text-slate-600 px-2.5 py-1 rounded-md font-black uppercase">${ej.musculo}</span>
                        </div>
                        <button type="button" onclick="eliminarEjercicio(${ej.id})" class="text-slate-300 hover:text-rose-500 p-2"><i data-lucide="trash-2" class="w-6 h-6"></i></button>
                    </div>
                    <div class="space-y-2">${sHtml}</div>`;
                container.appendChild(div);
                ej.series.forEach((s, idx) => renderTags(ej.id, idx, s.reps));
            });
            actualizarBarras();
            if (window.lucide) lucide.createIcons();
        }

        function actualizarBarras() {
            const panel = document.getElementById('panel-barras-musculos');
            panel.innerHTML = '';
            let hechos = {};
            Object.keys(METAS).forEach(m => hechos[m] = 0);

            for (let d = 1; d <= 6; d++) {
                (db[usuario].rutinas[d] || []).forEach(e => {
                    e.series.forEach(s => { if(s.peso || s.reps) hechos[e.musculo]++; });
                });
            }

            Object.keys(METAS).forEach(m => {
                const completadas = hechos[m];
                const metaMax = METAS[m];
                const quedan = Math.max(0, metaMax - completadas);
                const porcentaje = Math.min(100, (completadas / metaMax) * 100);
                
                panel.innerHTML += `
                    <div class="space-y-1">
                        <div class="flex justify-between text-sm font-semibold">
                            <span class="text-slate-700 font-black">${m}</span>
                            <span class="text-xs font-bold ${quedan===0?'text-emerald-600':'text-slate-500'}">${quedan===0?'¡Límite! 🔥':'Quedan '+quedan+' series'}</span>
                        </div>
                        <div class="w-full bg-slate-100 h-2.5 rounded-full overflow-hidden">
                            <div class="${quedan===0?'bg-emerald-500':'bg-blue-600'} h-full transition-all" style="width: ${porcentaje}%"></div>
                        </div>
                    </div>`;
            });
        }

        render();
    </script>
</body>
</html>
