<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PowerLog</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen antialiased p-4 max-w-md mx-auto space-y-6">

    <div class="flex justify-between items-center bg-white p-4 rounded-2xl border-2 border-slate-200 shadow-sm">
        <div>
            <h1 class="font-black text-2xl tracking-tight text-slate-800">💪 PowerLog</h1>
            <p class="text-[10px] font-black uppercase text-slate-400">Registro de Entrenamiento</p>
        </div>
        <select id="sel-user" onchange="seleccionarUsuario()" class="bg-slate-50 border-2 border-slate-300 font-black p-3 rounded-xl text-sm focus:outline-none">
            <option value="">Seleccionar perfil...</option>
            <option value="Nico V">Nico V</option>
            <option value="Nico">Nico</option>
            <option value="Samuel">Samuel</option>
        </select>
    </div>

    <div id="seccion-dias" class="space-y-3 hidden">
        <h2 class="font-black text-base text-slate-700">📅 Mis Rutinas (Selecciona un día)</h2>
        <div class="grid grid-cols-3 gap-2" id="dias-lista"></div>
    </div>

    <div id="seccion-form-ejercicio" class="bg-white border-2 border-slate-200 rounded-3xl p-4 shadow-sm space-y-3 hidden">
        <h3 class="font-black text-sm text-slate-800 border-b pb-1">➕ Añadir Ejercicio</h3>
        <div class="space-y-2.5 text-xs">
            <div>
                <label class="font-black text-slate-400 uppercase block mb-0.5">1. Grupo Muscular</label>
                <select id="form-musculo" onchange="actualizarSelectEjercicios()" class="w-full bg-slate-50 border-2 rounded-xl p-2.5 font-bold focus:outline-none">
                    <option value="Pecho">Pecho</option>
                    <option value="Espalda">Espalda</option>
                    <option value="Hombros">Hombros</option>
                    <option value="Bíceps">Bíceps</option>
                    <option value="Tríceps">Tríceps</option>
                    <option value="Cuádriceps">Cuádriceps</option>
                    <option value="Femorales">Femorales</option>
                    <option value="Gemelos">Gemelos</option>
                </select>
            </div>
            <div>
                <label class="font-black text-slate-400 uppercase block mb-0.5">2. Ejercicio</label>
                <select id="form-ejercicio" onchange="verificarCustomEj()" class="w-full bg-slate-50 border-2 rounded-xl p-2.5 font-bold focus:outline-none"></select>
                <input type="text" id="form-ejercicio-custom" placeholder="Escribe el nombre del ejercicio..." class="w-full bg-slate-50 border-2 rounded-xl p-2.5 font-bold focus:outline-none mt-1 hidden">
            </div>
            <div>
                <label class="font-black text-slate-400 uppercase block mb-0.5">3. Parte del músculo</label>
                <select id="form-parte" class="w-full bg-slate-50 border-2 rounded-xl p-2.5 font-bold focus:outline-none">
                    <option value="Medio">Medio / General</option>
                    <option value="Superior">Superior / Inclinado</option>
                    <option value="Inferior">Inferior / Declinado</option>
                    <option value="Interno">Interno</option>
                    <option value="Externo">Externo</option>
                    <option value="Otro">Otra zona</option>
                </select>
            </div>
            <button onclick="guardarNuevoEjercicio()" class="w-full bg-emerald-600 text-white font-black py-2.5 rounded-xl shadow-sm active:scale-98 mt-2">Guardar Ejercicio</button>
        </div>
    </div>

    <div id="seccion-ejercicios" class="bg-white border-2 border-slate-200 rounded-3xl p-4 shadow-sm space-y-4 hidden">
        <div class="flex justify-between items-center border-b pb-2">
            <div>
                <h3 id="titulo-dia-ejercicios" class="font-black text-base text-slate-800">Ejercicios</h3>
            </div>
            <button onclick="mostrarFormulario()" class="bg-emerald-600 text-white text-xs font-black px-3 py-2 rounded-xl shadow-sm active:scale-95">➕ Nuevo</button>
        </div>
        
        <div id="ejercicios-lista" class="space-y-4"></div>
        
        <button onclick="finalizarDia()" class="w-full bg-blue-600 text-white text-sm font-black py-3 rounded-xl shadow-md active:scale-98">✅ Finalizar y guardar Día</button>
    </div>

    <div class="bg-white border-2 border-slate-200 rounded-3xl p-4 shadow-sm space-y-3">
        <h4 class="text-xs font-black uppercase text-slate-400">📊 Volumen Semanal (Series acumuladas)</h4>
        <div id="panel-barras" class="space-y-2"></div>
    </div>

    <div class="bg-white border-2 border-slate-200 rounded-3xl p-4 shadow-sm space-y-3">
        <h3 class="font-black text-base text-slate-700">📅 Registro por Calendario</h3>
        <div class="text-center font-black text-sm text-slate-500 uppercase py-1" id="mes-titulo">Mes</div>
        <div class="grid grid-cols-7 gap-1 text-center text-[10px] font-black text-slate-400 uppercase">
            <span>D</span><span>L</span><span>M</span><span>M</span><span>J</span><span>V</span><span>S</span>
        </div>
        <div class="grid grid-cols-7 gap-1.5" id="celdas-calendario"></div>
        
        <div class="pt-2 border-t">
            <h4 class="text-[10px] font-black text-slate-400 uppercase mb-2" id="titulo-detalle">Toca un día marcado en azul</h4>
            <div id="lista-detalles-dia" class="space-y-2 max-h-48 overflow-y-auto"></div>
        </div>
    </div>

    <button onclick="limpiarTodo()" class="w-full bg-rose-50 border border-rose-200 text-rose-600 text-[10px] font-black py-3 rounded-xl">⚠️ Borrar datos y reiniciar app</button>

    <script>
        const METAS = { "Pecho": 20, "Espalda": 20, "Hombros": 20, "Bíceps": 15, "Tríceps": 15, "Cuádriceps": 20, "Femorales": 15, "Gemelos": 20 };
        
        const CATALOGO = {
            "Pecho": ["Press de Banca Plano", "Press Inclinado con Mancuernas", "Aperturas en Polea", "Fondos en Paralelas", "Pecho Declinado"],
            "Espalda": ["Dominadas", "Jalón al Pecho", "Remo con Barra", "Remo con Mancuerna", "Remo en Polea Baja", "Pullover"],
            "Hombros": ["Press Militar", "Elevaciones Laterales", "Vuelos Posteriores", "Vuelos Frontales", "Encogimientos Trapecio"],
            "Bíceps": ["Curl con Barra", "Curl con Mancuernas", "Curl Martillo", "Curl Scott", "Curl en Polea"],
            "Tríceps": ["Extensión en Polea", "Press Francés", "Copa con Mancuerna", "Patada de Tríceps", "Fondos en Banco"],
            "Cuádriceps": ["Sentadilla Libre", "Prensa 45°", "Extensión de Cuádriceps", "Zancadas", "Sentadilla Búlgara"],
            "Femorales": ["Curl Femoral", "Peso Muerto Rumano", "Buenos Días", "Máquina Femoral Parado"],
            "Gemelos": ["Elevación de Talones Parado", "Elevación de Talones Sentado", "Gemelos en Prensa"]
        };
        
        let user = localStorage.getItem('pl_user') || "";
        let dia = parseInt(localStorage.getItem('pl_dia')) || null;
        let db = JSON.parse(localStorage.getItem('pl_db')) || {};
        let history = JSON.parse(localStorage.getItem('pl_history')) || [];

        // Asegurar estructura del perfil activo al cargar la página
        if(user && !db[user]) {
            db[user] = { 1: [], 2: [], 3: [], 4: [], 5: [], 6: [] };
            localStorage.setItem('pl_db', JSON.stringify(db));
        }

        document.getElementById('sel-user').value = user;
        comprobarVistas();

        function comprobarVistas() {
            if(user && db[user]) {
                document.getElementById('seccion-dias').classList.remove('hidden');
                renderDias();
                if(dia && db[user][dia]) {
                    document.getElementById('seccion-ejercicios').classList.remove('hidden');
                    renderEjercicios();
                } else {
                    document.getElementById('seccion-ejercicios').classList.add('hidden');
                    document.getElementById('seccion-form-ejercicio').classList.add('hidden');
                }
            } else {
                document.getElementById('seccion-dias').classList.add('hidden');
                document.getElementById('seccion-ejercicios').classList.add('hidden');
                document.getElementById('seccion-form-ejercicio').classList.add('hidden');
            }
            actualizarBarras();
            renderizarCalendario();
        }

        function seleccionarUsuario() {
            user = document.getElementById('sel-user').value;
            localStorage.setItem('pl_user', user);
            dia = null;
            localStorage.removeItem('pl_dia');
            
            if(user && !db[user]) {
                db[user] = { 1: [], 2: [], 3: [], 4: [], 5: [], 6: [] };
                localStorage.setItem('pl_db', JSON.stringify(db));
            }
            comprobarVistas();
        }

        function renderDias() {
            const container = document.getElementById('dias-lista');
            container.innerHTML = '';
            
            for(let i=1; i<=6; i++) {
                const cant = db[user][i]?.length || 0;
                const esActivo = (i === dia);
                
                const btn = document.createElement('button');
                btn.className = `p-3 rounded-xl font-black text-xs flex flex-col items-center gap-1 border-2 transition-all ${esActivo ? 'bg-blue-600 text-white border-blue-700 shadow-md' : 'bg-white border-slate-200 text-slate-800'}`;
                btn.innerHTML = `<span>Día ${i}</span> <span class="${esActivo ? 'text-blue-200' : 'text-slate-400'} text-[10px] font-bold">${cant} ej.</span>`;
                
                btn.onclick = () => {
                    dia = i;
                    localStorage.setItem('pl_dia', i);
                    comprobarVistas();
                };
                container.appendChild(btn);
            }
        }

        function renderEjercicios() {
            document.getElementById('titulo-dia-ejercicios').innerText = `Ejercicios - Día ${dia}`;

            const container = document.getElementById('ejercicios-lista');
            container.innerHTML = '';

            const lista = db[user][dia] || [];
            if(lista.length === 0) {
                container.innerHTML = `<p class="text-xs text-slate-400 font-bold text-center py-6">No hay ejercicios cargados hoy.</p>`;
                return;
            }

            lista.forEach((ej, idxEj) => {
                const div = document.createElement('div');
                div.className = "bg-slate-50 p-3 rounded-2xl border border-slate-200 space-y-2";
                
                let seriesHtml = '';
                [0,1,2,3].forEach(sIdx => {
                    const s = ej.series[sIdx] || {peso:'', ps:''};
                    
                    let avisoIntensidad = '';
                    if (s.ps !== '') {
                        const repsNum = parseInt(s.ps) || 0;
                        if (repsNum <= 6) {
                            avisoIntensidad = `<span class="text-[8px] font-black bg-rose-200 text-rose-800 px-1.5 py-0.5 rounded-md uppercase ml-1">🪨 Pesado (≤6)</span>`;
                        } else if (repsNum >= 12) {
                            avisoIntensidad = `<span class="text-[8px] font-black bg-emerald-200 text-emerald-800 px-1.5 py-0.5 rounded-md uppercase ml-1">🪶 Liviano (≥12)</span>`;
                        }
                    }

                    seriesHtml += `
                    <div class="grid grid-cols-9 gap-1 items-center text-xs">
                        <span class="font-black text-slate-400">#${sIdx+1}</span>
                        <input type="number" placeholder="Peso" value="${s.peso || ''}" oninput="guardarSerie(${idxEj}, ${sIdx}, 'peso', this.value)" class="col-span-4 bg-white border p-1.5 rounded-lg text-center font-bold focus:outline-none">
                        <div class="col-span-4 flex items-center">
                            <input type="number" placeholder="Reps" value="${s.ps || ''}" oninput="guardarSerie(${idxEj}, ${sIdx}, 'ps', this.value)" class="w-full bg-white border p-1.5 rounded-lg text-center font-bold focus:outline-none">
                            ${avisoIntensidad}
                        </div>
                    </div>`;
                });

                div.innerHTML = `
                <div class="flex justify-between items-center">
                    <span class="font-black text-sm text-slate-800 leading-tight">${ej.nombre} 
                        <span class="text-[8px] bg-slate-200 px-1.5 py-0.5 rounded uppercase font-black tracking-wider block mt-0.5">Grupo: ${ej.musculo} • Zona: ${ej.parteMusculo}</span>
                    </span>
                    <button onclick="eliminarEj(${idxEj})" class="text-rose-500 font-bold text-xs bg-rose-50 px-2 py-1 rounded-lg self-start">X</button>
                </div>
                <div class="grid grid-cols-9 gap-1 text-[8px] font-black uppercase text-slate-400 text-center pt-2 border-t">
                    <span></span><span class="col-span-4">Peso (kg)</span><span class="col-span-4">Reps</span>
                </div>
                ${seriesHtml}`;
                container.appendChild(div);
            });
        }

        function mostrarFormulario() {
            document.getElementById('seccion-form-ejercicio').classList.remove('hidden');
            actualizarSelectEjercicios();
            window.scrollTo({ top: document.getElementById('seccion-form-ejercicio').offsetTop, behavior: 'smooth' });
        }

        function actualizarSelectEjercicios() {
            const musculoSel = document.getElementById('form-musculo').value;
            const selectEj = document.getElementById('form-ejercicio');
            selectEj.innerHTML = '';

            const listaEj = CATALOGO[musculoSel] || [];
            listaEj.forEach(ej => {
                const opt = document.createElement('option');
                opt.value = ej;
                opt.innerText = ej;
                selectEj.appendChild(opt);
            });

            const optOtro = document.createElement('option');
            optOtro.value = "Otro";
            optOtro.innerText = "➕ Otro (Escribir nombre)";
            selectEj.appendChild(optOtro);

            verificarCustomEj();
        }

        function verificarCustomEj() {
            const val = document.getElementById('form-ejercicio').value;
            const inputCustom = document.getElementById('form-ejercicio-custom');
            if(val === "Otro") {
                inputCustom.classList.remove('hidden');
            } else {
                inputCustom.classList.add('hidden');
            }
        }

        function guardarNuevoEjercicio() {
            const musculo = document.getElementById('form-musculo').value;
            const selectEj = document.getElementById('form-ejercicio').value;
            let nombreFinal = selectEj;

            if(selectEj === "Otro") {
                nombreFinal = document.getElementById('form-ejercicio-custom').value.trim();
                if(!nombreFinal) {
                    alert("Escribe el nombre del ejercicio.");
                    return;
                }
            }

            const parte = document.getElementById('form-parte').value;

            if(!db[user][dia]) db[user][dia] = [];
            db[user][dia].push({
                nombre: nombreFinal,
                musculo: musculo,
                parteMusculo: parte,
                series: [{peso:'',ps:''},{peso:'',ps:''},{peso:'',ps:''},{peso:'',ps:''}]
            });
            localStorage.setItem('pl_db', JSON.stringify(db));
            
            document.getElementById('seccion-form-ejercicio').classList.add('hidden');
            document.getElementById('form-ejercicio-custom').value = '';

            renderEjercicios();
            renderDias();
            actualizarBarras();
        }

        function guardarSerie(idxEj, sIdx, campo, val) {
            if(!db[user][dia][idxEj].series[sIdx]) db[user][dia][idxEj].series[sIdx] = {peso:'', ps:''};
            db[user][dia][idxEj].series[sIdx][campo] = val;
            localStorage.setItem('pl_db', JSON.stringify(db));
            
            if(campo === 'ps') {
                renderEjercicios();
            }
            actualizarBarras();
        }

        function eliminarEj(idx) {
            db[user][dia].splice(idx, 1);
            localStorage.setItem('pl_db', JSON.stringify(db));
            renderEjercicios();
            renderDias();
        }

        function finalizarDia() {
            const hoy = new Date();
            const fechaString = hoy.toISOString().split('T')[0];

            const lista = db[user][dia] || [];
            lista.forEach(ej => {
                ej.series.forEach((s, idxS) => {
                    if(s.peso || s.ps) {
                        history.push({
                            usuario: user, fecha: fechaString, dia: dia, 
                            ejercicio: ej.nombre, musculo: ej.musculo, parte: ej.parteMusculo,
                            serie: idxS+1, peso: s.peso, reps: s.ps
                        });
                    }
                });
            });
            
            localStorage.setItem('pl_history', JSON.stringify(history));
            alert(`¡Entrenamiento guardado en el historial del día de hoy!`);
            renderizarCalendario();
            actualizarBarras();
        }

        function actualizarBarras() {
            const panel = document.getElementById('panel-barras');
            panel.innerHTML = '';
            
            let hechos = {};
            Object.keys(METAS).forEach(m => hechos[m] = 0);

            if(user && db[user]) {
                for(let d=1; d<=6; d++) {
                    if(db[user][d]) {
                        db[user][d].forEach(ej => {
                            ej.series.forEach(s => {
                                if(s.peso || s.ps) {
                                    if(hechos[ej.musculo] !== undefined) hechos[ej.musculo]++;
                                }
                            });
                        });
                    }
                }
            }

            Object.keys(METAS).forEach(m => {
                const hechas = hechos[m] || 0;
                const meta = METAS[m];
                const porc = Math.min(100, (hechas / meta) * 100);
                
                panel.innerHTML += `
                <div class="text-xs space-y-0.5">
                    <div class="flex justify-between font-black text-slate-700">
                        <span>${m}</span>
                        <span>${hechas}/${meta} series</span>
                    </div>
                    <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                        <div class="bg-blue-600 h-full transition-all" style="width: ${porc}%"></div>
                    </div>
                </div>`;
            });
        }

        // ================= CALENDARIO =================
        function renderizarCalendario() {
            const fechaActual = new Date();
            const nombresMeses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            document.getElementById('mes-titulo').innerText = `${nombresMeses[fechaActual.getMonth()]} ${fechaActual.getFullYear()}`;

            const contenedorCeldas = document.getElementById('celdas-calendario');
            contenedorCeldas.innerHTML = '';

            const año = fechaActual.getFullYear();
            const mes =
