<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PowerLog - Directo</title>
    <style>
        :root {
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --danger: #e11d48;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 16px;
            min-height: 100vh;
            max-width: 420px;
            margin: 0 auto;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
        }

        h1 {
            font-size: 22px;
            font-weight: 900;
            text-align: center;
            color: var(--text-main);
            margin-bottom: 2px;
        }

        .sub {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            color: var(--text-muted);
            font-weight: 800;
            margin-bottom: 8px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        select, input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 16px;
            font-size: 13px;
            font-weight: 800;
            outline: none;
            transition: border-color 0.2s;
            background: #f8fafc;
        }

        select:focus, input:focus {
            border-color: var(--primary);
            background: #ffffff;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            border: none;
            border-radius: 16px;
            font-weight: 900;
            cursor: pointer;
            padding: 14px;
            font-size: 13px;
            transition: transform 0.1s, background-color 0.2s;
        }

        button:active {
            transform: scale(0.97);
        }

        .btn-add {
            background: var(--primary);
            color: #ffffff;
            margin-top: 2px;
        }

        .btn-add:hover {
            background: var(--primary-hover);
        }

        .lista-titulo {
            font-size: 13px;
            font-weight: 900;
            text-transform: uppercase;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
            margin-top: 6px;
        }

        .ej-lista {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 240px;
            overflow-y: auto;
            padding-right: 2px;
        }

        .ej-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8fafc;
            padding: 12px 16px;
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .ej-info {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .ej-nombre {
            font-size: 13px;
            font-weight: 900;
            color: var(--primary);
        }

        .ej-detalles {
            font-size: 11px;
            font-weight: 800;
            color: #334155;
        }

        .btn-eliminar {
            background: #fee2e2;
            color: var(--danger);
            padding: 8px 12px;
            font-size: 10px;
            border-radius: 12px;
            border: 1px solid #fecdd3;
        }

        .btn-limpiar {
            background: #fecdd3;
            color: #9f1239;
            font-size: 11px;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>💪 PowerLog</h1>
        <p class="sub">Selecciona y registra</p>

        <div class="form-group">
            <label>1. Grupo Muscular</label>
            <select id="sel-musculo" onchange="actualizarEjercicios()">
                <option value="Pecho">Pecho</option>
                <option value="Espalda">Espalda</option>
                <option value="Hombros">Hombros</option>
                <option value="Bíceps">Bíceps</option>
                <option value="Tríceps">Tríceps</option>
                <option value="Cuádriceps">Cuádriceps</option>
                <option value="Femorales">Femorales</option>
                <option value="Gemelos">Gemelos</option>
            </select>
        </div>

        <div class="form-group">
            <label>2. Ejercicio</label>
            <select id="sel-ejercicio"></select>
        </div>
        
        <div class="row">
            <div class="form-group">
                <label>3. Peso (kg)</label>
                <input type="number" id="peso" placeholder="0">
            </div>
            <div class="form-group">
                <label>4. Repeticiones</label>
                <input type="number" id="reps" placeholder="0">
            </div>
        </div>

        <button onclick="agregarRegistro()" class="btn-add">➕ Guardar Serie / Ejercicio</button>

        <div class="lista-titulo">📋 Registros de hoy</div>
        <div id="lista" class="ej-lista"></div>

        <button onclick="vaciarLista()" class="btn-limpiar">🗑️ Borrar todos los registros</button>
    </div>

    <script>
        const CATALOGO = {
            "Pecho": ["Press de Banca Plano", "Press Inclinado Mancuernas", "Aperturas Polea", "Fondos Paralelas"],
            "Espalda": ["Dominadas", "Jalón al Pecho", "Remo con Barra", "Remo Mancuerna", "Remo Polea Baja"],
            "Hombros": ["Press Militar", "Elevaciones Laterales", "Vuelos Posteriores"],
            "Bíceps": ["Curl con Barra", "Curl Mancuernas", "Curl Martillo", "Curl en Polea"],
            "Tríceps": ["Extensión en Polea", "Press Francés", "Copa Mancuerna"],
            "Cuádriceps": ["Sentadilla Libre", "Prensa 45°", "Extensión Cuádriceps", "Sentadilla Búlgara"],
            "Femorales": ["Curl Femoral", "Peso Muerto Rumano"],
            "Gemelos": ["Elevación Talones Parado", "Gemelos en Prensa"]
        };

        let registros = [];

        // Carga automática al iniciar
        try {
            registros = JSON.parse(localStorage.getItem('pl_directo')) || [];
        } catch(e) {
            registros = [];
        }

        actualizarEjercicios();
        refrescarLista();

        function actualizarEjercicios() {
            const musculoSel = document.getElementById('sel-musculo').value;
            const selectEj = document.getElementById('sel-ejercicio');
            selectEj.innerHTML = '';

            const lista = CATALOGO[musculoSel] || [];
            lista.forEach(item => {
                const opt = document.createElement('option');
                opt.value = item;
                opt.innerText = item;
                selectEj.appendChild(opt);
            });
        }

        function agregarRegistro() {
            const musculo = document.getElementById('sel-musculo').value;
            const ejercicio = document.getElementById('sel-ejercicio').value;
            const peso = document.getElementById('peso').value.trim();
            const reps = document.getElementById('reps').value.trim();

            if (!ejercicio) {
                alert("Selecciona un ejercicio primero.");
                return;
            }

            const nuevo = {
                id: Date.now(),
                musculo: musculo,
                ejercicio: ejercicio,
                peso: peso || "0",
                reps: reps || "0"
            };

            registros.push(nuevo);
            guardarYRefrescar();
            
            // Resetear valores de peso y reps para la siguiente serie
            document.getElementById('peso').value = '';
            document.getElementById('reps').value = '';
            document.getElementById('peso').focus();
        }

        function eliminarRegistro(id) {
            registros = registros.filter(item => item.id !== id);
            guardarYRefrescar();
        }

        function guardarYRefrescar() {
            localStorage.setItem('pl_directo', JSON.stringify(registros));
            refrescarLista();
        }

        function refrescarLista() {
            const contenedor = document.getElementById('lista');
            contenedor.innerHTML = '';

            if (registros.length === 0) {
                contenedor.innerHTML = `<div style="text-align: center; color: var(--text-muted); font-size: 11px; padding: 16px 0; font-weight: bold;">No hay registros guardados hoy.</div>`;
                return;
            }

            // Mostrar los registros en orden inverso (lo último que se anota queda arriba)
            [...registros].reverse().forEach(item => {
                const div = document.createElement('div');
                div.className = "ej-item";
                div.innerHTML = `
                    <div class="ej-info">
                        <span class="ej-nombre">${item.ejercicio}</span>
                        <span class="ej-detalles">Músculo: <b>${item.musculo}</b> | Peso: <b>${item.peso} kg</b> — Reps: <b>${item.reps}</b></span>
                    </div>
                    <button onclick="eliminarRegistro(${item.id})" class="btn-eliminar">✕</button>
                `;
                contenedor.appendChild(div);
            });
        }

        function vaciarLista() {
            if(confirm("¿Seguro querés borrar todos los registros de hoy?")) {
                registros = [];
                guardarYRefrescar();
            }
        }
    </script>
</body>
</html>
