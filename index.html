<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PowerLog</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen antialiased p-4 max-w-md mx-auto">

    <div class="flex justify-between items-center bg-white p-4 rounded-2xl border-2 border-slate-200 shadow-sm mb-4">
        <div>
            <h1 class="font-black text-2xl tracking-tight text-slate-800">💪 PowerLog</h1>
            <p class="text-[10px] font-black uppercase text-slate-400">Registro de Entrenamiento</p>
        </div>
        <select id="sel-user" onchange="seleccionarUsuario()" class="bg-slate-50 border-2 border-slate-300 font-black p-3 rounded-xl text-sm focus:outline-none">
            <option value="Nico V">Nico V</option>
            <option value="Nico">Nico</option>
            <option value="Samuel">Samuel</option>
        </select>
    </div>

    <div class="space-y-4">
        <h2 class="font-black text-lg text-slate-700">Mis Rutinas (Selecciona un día)</h2>
        <div id="dias-lista" class="space-y-2"></div>
    </div>

    <div class="mt-6 bg-white border-2 border-slate-200 rounded-3xl p-4 shadow-sm space-y-4">
        <div class="flex justify-between items-center border-b pb-2">
            <h3 id="titulo-dia-ejercicios" class="font-black text-base text-slate-800">Día 1 - Ejercicios</h3>
            <button onclick="agregarEjercicio()" class="bg-emerald-600 text-white text-xs font-black px-3 py-2 rounded-xl shadow-sm">➕ Agregar</button>
        </div>
        
        <div id="ejercicios-lista" class="space-y-3">
            <p class="text-xs text-slate-400 font-bold text-center py-6">Selecciona un día arriba para ver o agregar ejercicios.</p>
        </div>
    </div>

    <div class="mt-6 bg-white border-2 border-slate-200 rounded-3xl p-4 shadow-sm space-y-3">
        <h4 class="text-xs font-black uppercase text-slate-400">📊 Volumen Semanal</h4>
        <div id="panel-barras" class="space-y-2"></div>
    </div>

    <button onclick="limpiarTodo()" class="w-full bg-rose-50 border border-rose-200 text-rose-600 text-[10px] font-black py-3 rounded-xl mt-6">⚠️ Borrar datos y reiniciar app</button>

    <script>
        const METAS = { "Pecho": 20, "Espalda": 20, "Hombros": 20, "Bíceps": 15, "Tríceps": 15, "Cuádriceps": 20, "Femorales": 15, "Gemelos": 20 };
        
        let user = localStorage.getItem('pl_user') || "Nico V";
        let dia = parseInt(localStorage.getItem('pl_dia')) || 1;
        let db = JSON.parse(localStorage.getItem('pl_db')) || {};

        document.getElementById('sel-user').value = user;

        // Inicializar estructura base si no existe
        if (!db[user]) {
            db[user] = { 1: [], 2: [], 3: [], 4: [], 5: [], 6: [] };
        }

        renderDias();
        renderEjercicios();

        function seleccionarUsuario() {
            user = document.getElementById('sel-user').value;
            localStorage.setItem('pl_user', user);
            if (!db[user]) {
                db[user] = { 1: [], 2: [], 3: [], 4: [], 5: [], 6: [] };
            }
            renderDias();
            renderEjercicios();
        }

        function renderDias() {
            const container = document.getElementById('dias-lista');
            container.innerHTML = '';
            
            for(let i=1; i<=6; i++) {
                const cant = db[user][i]?.length || 0;
                const esActivo = (i === dia);
                
                const btn = document.createElement('button');
                btn.className = `w-full p-4 rounded-2xl font-black text-sm flex justify-between items-center border-2 transition-all ${esActivo ? 'bg-blue-600 text-white border-blue-700 shadow-md' : 'bg-white border-slate-200 text-slate-800'}`;
                btn.innerHTML = `<span>📅 Día ${i}</span> <span class="${esActivo ? 'text-blue-100' : 'text-slate-400'} text-xs">${cant} ejercicios</span>`;
                
                btn.onclick = () => {
                    dia = i;
                    localStorage.setItem('pl_dia', i);
                    renderDias();
                    renderEjercicios();
                };
                container.appendChild(btn);
            }
        }

        function renderEjercicios() {
            document.getElementById('titulo-dia-ejercicios').innerText = `Ejercicios del Día ${dia}`;
            const container = document.getElementById('ejercicios-lista');
            container.innerHTML = '';

            const lista = db[user][dia] || [];
            if(lista.length === 0) {
                container.innerHTML = `<p class="text-xs text-slate-400 font-bold text-center py-6">No hay ejercicios en el Día ${dia}. ¡Agrega uno!</p>`;
                actualizarBarras();
                return;
            }

            lista.forEach((ej, idxEj) => {
                const div = document.createElement('div');
                div.className = "bg-slate-50 p-3 rounded-2xl border border-slate-200 space-y-2";
                
                let seriesHtml = '';
                [0,1,2,3].forEach(sIdx => {
                    const s = ej.series[sIdx] || {peso:'', reps:''};
                    seriesHtml += `
                    <div class="grid grid-cols-9 gap-1 items-center text-xs">
                        <span class="font-black text-slate-400">#${sIdx+1}</span>
                        <input type="number" placeholder="Peso" value="${s.peso}" oninput="guardarSerie(${idxEj}, ${sIdx}, 'peso', this.value)" class="col-span-4 bg-white border p-1.5 rounded-lg text-center font-bold focus:outline-none">
                        <input type="number" placeholder="Reps" value="${s.reps}" oninput="guardarSerie(${idxEj}, ${sIdx}, 'reps', this.value)" class="col-span-4 bg-white border p-1.5 rounded-lg text-center font-bold focus:outline-none">
                    </div>`;
                });

                div.innerHTML = `
                <div class="flex justify-between items-center">
                    <span class="font-black text-sm text-slate-800">${ej.nombre} <span class="text-[8px] bg-slate-200 px-1.5 py-0.5 rounded uppercase font-black">${ej.musculo}</span></span>
                    <button onclick="eliminarEj(${idxEj})" class="text-rose-500 font-bold text-xs bg-rose-50 px-2 py-1 rounded-lg">X</button>
                </div>
                <div class="grid grid-cols-9 gap-1 text-[8px] font-black uppercase text-slate-400 text-center">
                    <span></span><span class="col-span-4">Peso (kg)</span><span class="col-span-4">Reps</span>
                </div>
                ${seriesHtml}`;
                container.appendChild(div);
            });
            actualizarBarras();
        }

        function agregarEjercicio() {
            const name = prompt("Nombre del ejercicio:");
            if(!name) return;
            const musculo = prompt("Músculo (Pecho, Espalda, Hombros, Bíceps, Tríceps, Cuádriceps, Femorales, Gemelos):", "Pecho");
            
            if(!db[user][dia]) db[user][dia] = [];
            db[user][dia].push({
                nombre: name,
                musculo: musculo || "Pecho",
                series: [{peso:'',reps:''},{peso:'',reps:''},{peso:'',reps:''},{peso:'',reps:''}]
            });
            localStorage.setItem('pl_db', JSON.stringify(db));
            renderEjercicios();
            renderDias();
        }

        function guardarEj(idx, sIdx, campo, val) {
            db[user][dia][idx].series[sIdx][campo] = val;
            localStorage.setItem('pl_db', JSON.stringify(db));
            actualizarBarras();
        }
        
        // Versión simplificada para evitar errores de comillas en el DOM
        function guardarSerie(idxEj, sIdx, campo, val) {
            db[user][dia][idxEj].series[sIdx][campo] = val;
            localStorage.setItem('pl_db', JSON.stringify(db));
            actualizarBarras();
        }

        function eliminarEj(idx) {
            db[user][dia].splice(idx, 1);
            localStorage.setItem('pl_db', JSON.stringify(db));
            renderEjercicios();
            renderDias();
        }

        function actualizarBarras() {
            const panel = document.getElementById('panel-barras');
            panel.innerHTML = '';
            
            let hechos = {};
            Object.keys(METAS).forEach(m => hechos[m] = 0);

            // Contar series con datos
            if(db[user]) {
                for(let d=1; d<=6; d++) {
                    if(db[user][d]) {
                        db[user][d].forEach(ej => {
                            ej.series.forEach(s => {
                                if(s.peso || s.reps) {
                                    if(hechos[ej.musculo] !== undefined) hechos[ej.musculo]++;
                                }
                            });
                        });
                    }
                }
            }

            Object.keys(METAS).forEach(m => {
                const hechas = hechos[m] || 0;
                const meta = METAS[m];
                const porc = Math.min(100, (hechas / meta) * 100);
                
                panel.innerHTML += `
                <div class="text-xs space-y-0.5">
                    <div class="flex justify-between font-black text-slate-700">
                        <span>${m}</span>
                        <span>${hechas}/${meta}</span>
                    </div>
                    <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                        <div class="bg-blue-600 h-full" style="width: ${porc}%"></div>
                    </div>
                </div>`;
            });
        }

        function limpiarTodo() {
            if(confirm("¿Seguro querés borrar todo?")) {
                localStorage.clear();
                location.reload();
            }
        }
    </script>
</body>
</html>
