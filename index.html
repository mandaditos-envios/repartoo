<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PowerLog - Simple</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --danger: #e11d48;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 16px;
            min-height: 100vh;
            max-width: 420px;
            margin: 0 auto;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 22px;
            font-weight: 900;
            text-align: center;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .sub {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            color: var(--text-muted);
            font-weight: 800;
            margin-bottom: 12px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 16px;
            font-size: 13px;
            font-weight: 800;
            outline: none;
            transition: border-color 0.2s;
            background: #f8fafc;
        }

        input:focus {
            border-color: var(--primary);
            background: #ffffff;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            border: none;
            border-radius: 16px;
            font-weight: 900;
            cursor: pointer;
            padding: 14px;
            font-size: 13px;
            transition: transform 0.1s, background-color 0.2s;
        }

        button:active {
            transform: scale(0.97);
        }

        .btn-add {
            background: var(--primary);
            color: #ffffff;
            margin-top: 4px;
        }

        .btn-add:hover {
            background: var(--primary-hover);
        }

        .lista-titulo {
            font-size: 13px;
            font-weight: 900;
            text-transform: uppercase;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
            margin-top: 8px;
        }

        .ej-lista {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 280px;
            overflow-y: auto;
            padding-right: 2px;
        }

        .ej-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f1f5f9;
            padding: 12px 16px;
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .ej-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .ej-nombre {
            font-size: 13px;
            font-weight: 900;
        }

        .ej-detalles {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
        }

        .btn-eliminar {
            background: #fee2e2;
            color: var(--danger);
            padding: 8px 12px;
            font-size: 10px;
            border-radius: 12px;
            border: 1px solid #fecdd3;
        }

        .btn-limpiar {
            background: #fecdd3;
            color: #9f1239;
            font-size: 11px;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>💪 PowerLog</h1>
        <p class="sub">Registro Directo</p>

        <div class="form-group">
            <label>Nombre del Ejercicio</label>
            <input type="text" id="nombre" placeholder="Ej: Press de banca, Dominadas...">
        </div>
        
        <div class="row">
            <div class="form-group">
                <label>Peso (kg)</label>
                <input type="number" id="peso" placeholder="0">
            </div>
            <div class="form-group">
                <label>Repeticiones</label>
                <input type="number" id="reps" placeholder="0">
            </div>
        </div>

        <button onclick="agregarEjercicio()" class="btn-add">➕ Guardar Ejercicio</button>

        <div class="lista-titulo">📋 Mis ejercicios guardados hoy</div>
        <div id="lista" class="ej-lista"></div>

        <button onclick="vaciarListaRutinaria()" class="btn-limpiar">🗑️ Borrar lista completa</button>
    </div>

    <script>
        let ejerciciosGuardados = [];

        // Carga automática al iniciar
        try {
            ejerciciosGuardados = JSON.parse(localStorage.getItem('pl_simples')) || [];
        } catch(e) {
            ejerciciosGuardados = [];
        }

        refrescarLista();

        function agregarEjercicio() {
            const nombre = document.getElementById('nombre').value.trim();
            const peso = document.getElementById('peso').value.trim();
            const reps = document.getElementById('reps').value.trim();

            if (!nombre) {
                alert("Por favor, ingresa el nombre del ejercicio.");
                return;
            }

            const nuevo = {
                id: Date.now(),
                nombre: nombre,
                peso: peso || "0",
                reps: reps || "0"
            };

            ejerciciosGuardados.push(nuevo);
            guardarYRefrescar();
            
            // Limpiar campos para el siguiente
            document.getElementById('nombre').value = '';
            document.getElementById('peso').value = '';
            document.getElementById('reps').value = '';
            document.getElementById('nombre').focus();
        }

        function eliminarEjercicio(id) {
            ejerciciosGuardados = ejerciciosGuardados.filter(item => item.id !== id);
            guardarYRefrescar();
        }

        function guardarYRefrescar() {
            localStorage.setItem('pl_simples', JSON.stringify(ejerciciosGuardados));
            refrescarLista();
        }

        function refrescarLista() {
            const contenedor = document.getElementById('lista');
            contenedor.innerHTML = '';

            if (ejerciciosGuardados.length === 0) {
                contenedor.innerHTML = `<div style="text-align: center; color: var(--text-muted); font-size: 11px; padding: 16px 0; font-weight: bold;">Sin ejercicios guardados aún.</div>`;
                return;
            }

            ejerciciosGuardados.forEach(item => {
                const div = document.createElement('div');
                div.className = "ej-item";
                div.innerHTML = `
                    <div class="ej-info">
                        <span class="ej-nombre">${item.nombre}</span>
                        <span class="ej-detalles">Peso: <b>${item.peso} kg</b> | Reps: <b>${item.reps}</b></span>
                    </div>
                    <button onclick="eliminarEjercicio(${item.id})" class="btn-eliminar">✕</button>
                `;
                contenedor.appendChild(div);
            });
        }

        function vaciarListaRutinaria() {
            if(confirm("¿Seguro que querés vaciar la lista de hoy?")) {
                ejerciciosGuardados = [];
                guardarYRefrescar();
            }
        }
    </script>
</body>
</html>
