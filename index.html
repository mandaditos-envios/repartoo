<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym Tracker Pro</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#121212;
color:white;
padding:20px;
}

h1{
text-align:center;
margin-bottom:20px;
}

.menu{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-bottom:20px;
}

button{
background:#1f1f1f;
color:white;
border:none;
padding:15px;
border-radius:12px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#333;
}

.card{
background:#1e1e1e;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

input,select{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:12px;
border-radius:8px;
border:none;
}

.hidden{
display:none;
}

.item{
background:#2a2a2a;
padding:10px;
border-radius:8px;
margin-top:10px;
}

.stat{
padding:8px;
border-bottom:1px solid #333;
}
</style>
</head>
<body>

<h1>🏋️ Gym Tracker Pro</h1>

<div class="menu">
<button onclick="abrirDia('Dia 1')">Día 1</button>
<button onclick="abrirDia('Dia 2')">Día 2</button>
<button onclick="abrirDia('Dia 3')">Día 3</button>
<button onclick="abrirDia('Dia 4')">Día 4</button>
<button onclick="abrirDia('Dia 5')">Día 5</button>
<button onclick="mostrarStats()">📊 Estadísticas</button>
</div>

<div id="contenido"></div>

<script>

const ejerciciosBase = {
"Press banca":"Pecho",
"Press inclinado":"Pecho",
"Aperturas":"Pecho",
"Remo":"Espalda",
"Jalon":"Espalda",
"Curl barra":"Biceps",
"Curl martillo":"Biceps",
"Press frances":"Triceps",
"Extensiones":"Triceps",
"Press militar":"Hombros",
"Elevaciones laterales":"Hombros",
"Sentadilla":"Cuadriceps",
"Prensa":"Cuadriceps",
"Peso muerto":"Isquios",
"Gemelos":"Gemelos"
};

let datos = JSON.parse(localStorage.getItem("gymtracker")) || [];

function guardar(){
localStorage.setItem("gymtracker",JSON.stringify(datos));
}

function abrirDia(dia){

let opciones="";

for(let ejercicio in ejerciciosBase){
opciones+=`<option>${ejercicio}</option>`;
}

document.getElementById("contenido").innerHTML=`

<div class="card">
<h2>${dia}</h2>

<select id="ejercicio">
${opciones}
</select>

<input type="number" id="peso" placeholder="Peso (kg)">

<input type="number" id="series" placeholder="Series">

<input type="number" id="reps" placeholder="Repeticiones">

<button onclick="agregar('${dia}')">
Guardar ejercicio
</button>

</div>

<div id="lista"></div>
`;

mostrarEjercicios(dia);
}

function agregar(dia){

const ejercicio =
document.getElementById("ejercicio").value;

const item = {
fecha:new Date().toLocaleDateString(),
dia,
ejercicio,
musculo:ejerciciosBase[ejercicio],
peso:Number(document.getElementById("peso").value),
series:Number(document.getElementById("series").value),
reps:Number(document.getElementById("reps").value)
};

datos.push(item);

guardar();

abrirDia(dia);
}

function mostrarEjercicios(dia){

const lista =
document.getElementById("lista");

const filtrados =
datos.filter(x=>x.dia===dia);

let html="<div class='card'><h3>Ejercicios guardados</h3>";

filtrados.forEach(e=>{

html+=`
<div class="item">
<strong>${e.ejercicio}</strong><br>
${e.peso} kg |
${e.series} series |
${e.reps} reps
</div>
`;

});

html+="</div>";

lista.innerHTML=html;
}

function mostrarStats(){

let seriesMusculo={};

datos.forEach(e=>{

if(!seriesMusculo[e.musculo]){
seriesMusculo[e.musculo]=0;
}

seriesMusculo[e.musculo]+=e.series;

});

let html=`
<div class="card">
<h2>📊 Estadísticas</h2>
`;

for(let musculo in seriesMusculo){

html+=`
<div class="stat">
<strong>${musculo}</strong> :
${seriesMusculo[musculo]} series
</div>
`;

}

html+="</div>";

document.getElementById("contenido").innerHTML=
html;
}

</script>

</body>
</html>
