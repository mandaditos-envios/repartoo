<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PowerLog - Inicio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen p-4 flex flex-col justify-start">

    <div class="space-y-8 pt-12 w-full">
        <div class="text-center space-y-3">
            <div class="bg-blue-600 w-24 h-24 rounded-3xl mx-auto flex items-center justify-center text-white shadow-xl shadow-blue-600/20">
                <i data-lucide="dumbbell" class="w-12 h-12"></i>
            </div>
            <h1 class="text-4xl font-black tracking-tight text-slate-800">Entrenamiento</h1>
            <p class="text-base text-slate-400 font-semibold">Desliza abajo para elegir tu nombre</p>
        </div>

        <div class="space-y-4 pt-4 w-full">
            <div class="relative">
                <select id="selector-usuario-principal" class="w-full bg-white border-2 border-slate-300 text-slate-800 font-black py-6 px-6 rounded-2xl text-xl shadow-md appearance-none text-center focus:outline-none focus:border-blue-600">
                    <option value="Nico V">Nico V</option>
                    <option value="Nico">Nico</option>
                    <option value="Samuel">Samuel</option>
                </select>
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-6 text-slate-500">
                    <i data-lucide="chevron-down" class="w-6 h-6"></i>
                </div>
            </div>

            <button type="button" onclick="ingresarNativo()" class="w-full bg-blue-600 text-white font-black py-6 px-6 rounded-2xl text-xl shadow-lg text-center block mt-4 active:bg-blue-800">
                Ingresar a mi Perfil
            </button>
        </div>
    </div>

    <script>
        function ingresarNativo() {
            const usuario = document.getElementById('selector-usuario-principal').value;
            // Guardamos quién entra para que la otra página sepa de quién es
            localStorage.setItem('usuario_actual', usuario);
            // Salto de página nativo del navegador
            window.location.href = 'perfil.html';
        }
        document.addEventListener('DOMContentLoaded', () => { if (window.lucide) lucide.createIcons(); });
    </script>
</body>
</html>
