<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PowerLog - Registro de Entrenamiento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            -webkit-tap-highlight-color: transparent;
        }
        /* Scrollbar personalizado sutil */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9; 
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen antialiased selection:bg-blue-100">

    <div class="w-full min-h-screen p-4 flex flex-col justify-start max-w-md mx-auto">

        <div id="view-inicio" class="space-y-10 pt-16 w-full animate-fadeIn">
            <div class="text-center space-y-4">
                <div class="bg-blue-600 w-24 h-24 rounded-3xl mx-auto flex items-center justify-center text-white shadow-xl shadow-blue-600/20">
                    <span class="text-4xl">💪</span>
                </div>
                <div>
                    <h1 class="text-4xl font-black tracking-tight text-slate-800">PowerLog</h1>
                    <p class="text-sm text-slate-400 font-bold uppercase tracking-wider mt-1">Registro de Entrenamiento</p>
                </div>
            </div>

            <div class="bg-white border-2 border-slate-200 rounded-3xl p-6 shadow-sm space-y-5">
                <p class="text-base text-slate-600 font-extrabold text-center">Selecciona tu perfil para continuar</p>
                
                <div class="relative">
                    <select id="selector-usuario-principal" class="w-full bg-slate-50 border-2 border-slate-200 text-slate-800 font-black py-5 px-6 rounded-2xl text-xl shadow-inner appearance-none text-center focus:outline-none focus:border-blue-600 transition-colors">
                        <option value="Nico V">Nico V</option>
                        <option value="Nico">Nico</option>
                        <option value="Samuel">Samuel</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-6 text-slate-400">
                        ▼
                    </div>
                </div>

                <button type="button" onclick="ingresarAlPerfil()" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl text-xl shadow-lg shadow-blue-600/20 active:scale-[0.98] transition-transform text-center block">
                    Ingresar
                </button>
            </div>
        </div>

        <div id="view-usuario" class="space-y-6 w-full" style="display: none;">
            <div class="flex items-center justify-between border-b-2 border-slate-100 pb-4">
                <button type="button" onclick="cambiarVista('view-inicio')" class="text-sm font-black text-slate-500 flex items-center gap-2 py-2 px-3 bg-slate-100 rounded-xl active:scale-95 transition-transform">
                    ↩️ Salir
                </button>
                <div class="text-right">
                    <span class="text-[10px] font-black text-blue-600 uppercase tracking-wider block">Usuario</span>
                    <h2 id="nombre-perfil-activo" class="text-xl font-black text-slate-800 leading-none">---</h2>
                </div>
            </div>

            <button type="button" onclick="abrirCalendarioRegistro()" class="w-full bg-slate-900 text-white font-black py-4.5 px-6 rounded-2xl text-base flex items-center justify-center gap-3 shadow-md active:scale-[0.98] transition-transform">
                📅 Ver Registro Histórico
            </button>

            <div class="space-y-1 pt-2">
                <h3 class="text-xl font-black text-slate-800">Mis Rutinas</h3>
                <p class="text-xs text-slate-400 font-black uppercase tracking-wider">Elige el día de entrenamiento</p>
            </div>

            <div class="space-y-3 w-full" id="lista-dias-container"></div>
            
            <div class="pt-4 border-t border-slate-100 mt-6">
                <button type="button" onclick="limpiarMemoriaTotal()" class="w-full bg-rose-50/80 border border-rose-100 text-rose-600 text-[11px] font-black py-3 rounded-xl active:scale-95 transition-transform">⚠️ Reiniciar aplicación (Borrar datos)</button>
            </div>
        </div>

        <div id="view-dia" class="space-y-6 w-full" style="display: none;">
            <div class="flex items-center justify-between border-b-2 border-slate-100 pb-4">
                <button type="button" onclick="cambiarVista('view-usuario')" class="text-sm font-black text-slate-500 flex items-center gap-2 py-2 px-3 bg-slate-100 rounded-xl active:scale-95 transition-transform">
                    ↩️ Volver
                </button>
                <div class="text-right">
                    <span id="txt-perfil-en-dia" class="text-[10px] text-slate-400 font-black uppercase tracking-wider block">---</span>
                    <h2 id="txt-dia-activo" class="text-2xl font-black text-slate-800 leading-none">Día X</h2>
                </div>
            </div>

            <button type="button" onclick="abrirModal()" class="w-full bg-emerald-600 text-white font-black py-5 rounded-2xl text-base flex items-center justify-center gap-2 shadow-md shadow-emerald-600/10 active:scale-[0.98] transition-transform">
                ➕ Agregar Ejercicio
            </button>

            <div class="space-y-4 w-full" id="bloque-ejercicios-lista"></div>

            <div class="bg-white border-2 border-slate-200 rounded-3xl p-5 space-y-4 shadow-sm">
                <h4 class="text-xs font-black uppercase tracking-wider text-slate-400 flex items-center gap-1.5">
                    📊 Volumen Semanal Completado
                </h4>
                <div id="panel-barras-musculos" class="space-y-3.5"></div>
            </div>

            <button type="button" onclick="finalizarEntrenamientoDia()" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl text-lg shadow-lg shadow-blue-600/20 active:scale-[0.98] transition-transform block mt-6">
                ✅ Finalizar Entrenamiento
            </button>
        </div>

        <div id="view-registro" class="space-y-6 w-full" style="display: none;">
            <div class="flex items-center justify-between border-b-2 border-slate-100 pb-4">
                <button type="button" onclick="cambiarVista('view-usuario')" class="text-sm font-black text-slate-500 flex items-center gap-2 py-2 px-3 bg-slate-100 rounded-xl active:scale-95 transition-transform">
                    ↩️ Volver al Perfil
                </button>
                <h2 class="text-base font-black text-slate-800 flex items-center gap-2">
                    📅 Historial
                </h2>
            </div>

            <div class="bg-white border-2 border-slate-200 rounded-3xl p-4 shadow-sm space-y-3">
                <div class="text-center font-black text-lg text-slate-700 uppercase py-1 tracking-wide" id="mes-titulo">Mes</div>
                <div class="grid grid-cols-7 gap-1 text-center text-xs font-black text-slate-400 uppercase py-1">
                    <span>D</span><span>L</span><span>M</span><span>M</span><span>J</span><span>V</span><span>S</span>
                </div>
                <div class="grid grid-cols-7 gap-1.5" id="celdas-calendario"></div>
            </div>

            <div class="space-y-2">
                <h3 class="text-xs font-black uppercase tracking-wider text-slate-400" id="titulo-detalle">Toca un día marcado en azul</h3>
                <div id="lista-detalles-dia" class="space-y-2 max-h-64 overflow-y-auto pr-1"></div>
            </div>
        </div>

    </div>

    <div id="modal-ejercicio" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fadeIn" style="display: none;">
        <div class="bg-white rounded-3xl w-full max-w-sm p-6 space-y-5 shadow-2xl border border-slate-100">
            <h3 class="text-xl font-black text-slate-800 border-b-2 border-slate-100 pb-2">Nuevo Ejercicio</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-wider block mb-1">Nombre del Ejercicio</label>
                    <input type="text" id="input-nombre-ejercicio" placeholder="Ej. Press Inclinado" class="w-full bg-slate-50 border-2 border-slate-200 rounded-xl px-4 py-3 text-base font-black text-slate-800 focus:outline-none focus:border-blue-600 transition-colors">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-wider block mb-1">Grupo Muscular</label>
                    <select id="select-grupo-muscular" class="w-full bg-slate-50 border-2 border-slate-200 rounded-xl px-3 py-3 text-base font-black text-slate-700 focus:outline-none focus:border-blue-600 transition-colors">
                        <option value="Pecho">Pecho (10-20 series)</option>
                        <option value="Espalda">Espalda (10-20 series)</option>
                        <option value="Hombros">Hombros (10-20 series)</option>
                        <option value="Bíceps">Bíceps (8-15 series)</option>
                        <option value="Tríceps">Tríceps (8-15 series)</option>
                        <option value="Cuádriceps">Cuádriceps (10-20 series)</option>
                        <option value="Femorales">Femorales (8-15 series)</option>
                        <option value="Gemelos">Gemelos (8-20 series)</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3 pt-2">
                <button type="button" onclick="cerrarModal()" class="bg-slate-100 text-slate-600 font-black py-3.5 rounded-xl active:scale-95 transition-transform">Cancelar</button>
                <button type="button" onclick="crearEjercicio()" class="bg-blue-600 text-white font-black py-3.5 rounded-xl shadow-md shadow-blue-600/10 active:scale-95 transition-transform">Guardar</button>
            </div>
        </div>
    </div>

    <script>
        const METAS = { "Pecho": 20, "Espalda": 20, "Hombros": 20, "Bíceps": 15, "Tríceps": 15, "Cuádriceps": 20, "Femorales": 15, "Gemelos": 20 };
        
        let usuarioActivo = "";
        let diaActivo = 1;
        let db = {};
        let logsHistorial = [];

        try {
            usuarioActivo = localStorage.getItem('powerlog_usuario_actual') || "";
            diaActivo = parseInt(localStorage.getItem('powerlog_dia_actual')) || 1;
            db = JSON.parse(localStorage.getItem('powerlog_db_v16')) || {};
            logsHistorial = JSON.parse(localStorage.getItem('powerlog_history_v16')) || [];
        } catch(e) {
            console.error("Error cargando base de datos, reiniciando...", e);
            limpiarMemoriaTotal();
        }

        // Mostrar vista inicial al cargar
        if (usuarioActivo && db[usuarioActivo]) {
            cambiarVista('view-usuario');
            renderizarPerfil();
        } else {
            cambiarVista('view-inicio');
        }

        function limpiarMemoriaTotal() {
            localStorage.removeItem('powerlog_usuario_actual');
            localStorage.removeItem('powerlog_dia_actual');
            localStorage.removeItem('powerlog_db_v16');
            localStorage.removeItem('powerlog_history_v16');
            usuarioActivo = "";
            db = {};
            logsHistorial = [];
            alert("Memoria restablecida correctamente.");
            cambiarVista('view-inicio');
        }

        function cambiarVista(idVista) {
            document.getElementById('view-inicio').style.display = 'none';
            document.getElementById('view-usuario').style.display = 'none';
            document.getElementById('view-dia').style.display = 'none';
            document.getElementById('view-registro').style.display = 'none';

            document.getElementById(idVista).style.display = 'block';
            window.scrollTo(0, 0);
        }

        function calcularSemanaAño() {
            const copiaFecha = new Date();
            copiaFecha.setHours(0,0,0,0);
            copiaFecha.setDate(copiaFecha.getDate() + 4 - (copiaFecha.getDay() || 7));
            const inicioAño = new Date(copiaFecha.getFullYear(), 0, 1);
            return `${copiaFecha.getFullYear()}-W${Math.ceil((((copiaFecha - inicioAño) / 86400000) + 1) / 7)}`;
        }

        function ingresarAlPerfil() {
            try {
                usuarioActivo = document.getElementById('selector-usuario-principal').value;
                localStorage.setItem('powerlog_usuario_actual', usuarioActivo);
                
                if (!db[usuarioActivo]) {
                    db[usuarioActivo] = {
                        rutinas: { 1: [], 2: [], 3: [], 4: [], 5: [], 6: [] },
                        checksSemanales: { 1: false, 2: false, 3: false, 4: false, 5: false, 6: false },
                        identificadorSemana: calcularSemanaAño()
                    };
                }

                const semanaActual = calcularSemanaAño();
                const completóTodo = Object.values(db[usuarioActivo].checksSemanales || {}).every(v => v === true);
                
                if (db[usuarioActivo].identificadorSemana !== semanaActual || completóTodo) {
                    db[usuarioActivo].checksSemanales = { 1: false, 2: false, 3: false, 4: false, 5: false, 6: false };
                    db[usuarioActivo].identificadorSemana = semanaActual;
                }
                localStorage.setItem('powerlog_db_v16', JSON.stringify(db));

                renderizarPerfil();
                cambiarVista('view-usuario');
            } catch (err) {
                alert("Error de acceso: " + err.message);
            }
        }

        function renderizarPerfil() {
            document.getElementById('nombre-perfil-activo').innerText = usuarioActivo;
            const container = document.getElementById('lista-dias-container');
            container.innerHTML = '';
            const checks = db[usuarioActivo]?.checksSemanales || { 1: false, 2: false, 3: false, 4: false, 5: false, 6: false };

            for (let i = 1; i <= 6; i++) {
                const cant = db[usuarioActivo]?.rutinas[i]?.length || 0;
                const estaListo = checks[i];
                
                const btn = document.createElement('button');
                btn.type = "button";
                btn.className = `w-full border-2 ${estaListo ? 'bg-emerald-50 border-emerald-300' : 'bg-white border-slate-200'} text-left font-black py-4 px-5 rounded-2xl flex items-center justify-between text-base text-slate-800 shadow-sm active:scale-[0.98] transition-all`;
                
                btn.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-3.5 h-3.5 rounded-full ${estaListo ? 'bg-emerald-500' : 'bg-blue-600'}"></div>
                        <span class="text-lg">Día ${i}</span>
                        ${estaListo ? '<span class="text-emerald-600 text-[10px] font-black tracking-wider bg-emerald-100 px-2 py-0.5 rounded-md">✔️ COMPLETADO</span>' : ''}
                    </div>
                    <span class="text-xs text-slate-400 font-black tracking-wider bg-slate-50 px-2.5 py-1 rounded-xl">${cant > 0 ? cant + ' Ejercicios' : 'Vacío'}</span>
                `;
                
                btn.onclick = function() {
                    localStorage.setItem('powerlog_dia_actual', i);
                    diaActivo = i;
                    irAlDia();
                };
                container.appendChild(btn);
            }
        }

        function irAlDia() {
            document.getElementById('txt-perfil-en-dia').innerText = usuarioActivo;
            document.getElementById('txt-dia-activo').innerText = `Día ${diaActivo}`;
            renderEjercicios();
            cambiarVista('view-dia');
        }

        function abrirModal() { document.getElementById('modal-ejercicio').style.display = 'flex'; }
        function cerrarModal() { document.getElementById('modal-ejercicio').style.display = 'none'; document.getElementById('input-nombre-ejercicio').value = ''; }

        function crearEjercicio() {
            const textName = document.getElementById('input-nombre-ejercicio').value.trim();
            const musculo = document.getElementById('select-grupo-muscular').value;
            if(!textName) return;

            if(!db[usuarioActivo].rutinas[diaActivo]) db[usuarioActivo].rutinas[diaActivo] = [];
            db[usuarioActivo].rutinas[diaActivo].push({
                id: Date.now(), nombre: textName, musculo: musculo,
                series: [{peso:'',reps:''},{peso:'',reps:''},{peso:'',reps:''},{peso:'',reps:''}]
            });
            localStorage.setItem('powerlog_db_v16', JSON.stringify(db));
            cerrarModal();
            renderEjercicios();
            renderizarPerfil();
        }

        function eliminarEjercicio(id) {
            db[usuarioActivo].rutinas[diaActivo] = db[usuarioActivo].rutinas[diaActivo].filter(e => e.id !== id);
            localStorage.setItem('powerlog_db_v16', JSON.stringify(db));
            renderEjercicios();
            renderizarPerfil();
        }

        function guardarValorSerie(idEj, idx, campo, valor) {
            const ej = db[usuarioActivo].rutinas[diaActivo].find(e => e.id === idEj);
            if (ej) {
                ej.series[idx][campo] = valor;
                localStorage.setItem('powerlog_db_v16', JSON.stringify(db));
                actualizarBarrasMusculos();
            }
        }

        function finalizarEntrenamientoDia() {
            db[usuarioActivo].checksSemanales[diaActivo] = true;
            localStorage.setItem('powerlog_db_v16', JSON.stringify(db));

            const hoy = new Date();
            const fechaString = hoy.toISOString().split('T')[0];
            const listaEjercicios = db[usuarioActivo].rutinas[diaActivo] || [];
            
            listaEjercicios.forEach(ej => {
                ej.series.forEach((s, idx) => {
                    if (s.peso || s.reps) {
                        logsHistorial.push({
                            fechaKey: fechaString, usuario: usuarioActivo, diaNum: diaActivo,
                            ejercicio: ej.nombre, musculo: ej.musculo, serie: idx + 1,
                            peso: s.peso || '0', reps: s.reps || '0'
                        });
                    }
                });
            });

            localStorage.setItem('powerlog_history_v16', JSON.stringify(logsHistorial));
            alert(`¡Día ${diaActivo} finalizado y guardado!`);
            renderizarPerfil();
            cambiarVista('view-usuario');
        }

        function renderEjercicios() {
            const container = document.getElementById('bloque-ejercicios-lista');
            container.innerHTML = '';
            const listado = db[usuarioActivo].rutinas[diaActivo] || [];

            if (listado.length === 0) {
                container.innerHTML = `<div class="py-10 text-center border-2 border-dashed border-slate-200 rounded-3xl bg-white text-slate-400 font-extrabold text-sm">Sin ejercicios registrados. <br>Añade uno desde el botón superior.</div>`;
                actualizarBarrasMusculos();
                return;
            }

            listado.forEach(ej => {
                const card = document.createElement('div');
                card.class
