<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Rutina de Gym</title>
    <!-- Tailwind CSS para que se vea impecable y profesional -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Iconos limpios -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen antialiased selection:bg-indigo-500/30">

    <div class="max-w-md mx-auto p-4 pb-12">
        
        <!-- ENCABEZADO -->
        <header class="flex items-center gap-3 mb-6 pt-2">
            <div class="bg-indigo-600 p-2 rounded-xl text-white shadow-md shadow-indigo-600/20">
                <i data-lucide="dumbbell" class="w-5 h-5"></i>
            </div>
            <div>
                <h1 class="text-xl font-black tracking-tight">POWERLOG</h1>
                <p class="text-[11px] text-slate-400 font-medium">Mi entrenamiento personal</p>
            </div>
        </header>

        <!-- RECORDATORIO INTELIGENTE -->
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 mb-6 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-500/10 p-2 rounded-lg text-indigo-400">
                    <i data-lucide="calendar" class="w-4 h-4"></i>
                </div>
                <div>
                    <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400 block">Próximo entreno</span>
                    <span id="reminder-text" class="text-sm font-semibold text-indigo-400">Día 1</span>
                </div>
            </div>
            <button onclick="irADiaSiguiente()" class="bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-bold px-3 py-2 rounded-xl transition active:scale-95">
                Entrenar Ya
            </button>
        </div>

        <!-- SELECTOR DE LOS 6 DÍAS (PESTAÑAS) -->
        <div class="grid grid-cols-3 gap-2 mb-6" id="days-tabs-container">
            <!-- Los 6 botones de días se generan aquí con JavaScript -->
        </div>

        <!-- SECCIÓN DEL DÍA SELECCIONADO -->
        <main class="space-y-4">
            <div class="flex justify-between items-center bg-slate-900/40 p-2 rounded-xl border border-slate-900">
                <h2 id="selected-day-title" class="text-lg font-bold text-slate-200">Día 1</h2>
                <button onclick="abrirModal()" class="bg-indigo-600/10 hover:bg-indigo-600/20 text-indigo-400 text-xs font-bold px-3 py-2 rounded-xl flex items-center gap-1.5 transition">
                    <i data-lucide="plus" class="w-3.5 h-3.5"></i> Añadir Ejercicio
                </button>
            </div>

            <!-- LISTA DE EJERCICIOS -->
            <div id="exercises-container" class="space-y-4">
                <!-- Aquí aparecen los ejercicios del día -->
            </div>

            <!-- ACCIONES DEL DÍA -->
            <div class="pt-2">
                <button onclick="finalizarEntrenamiento()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3.5 rounded-2xl flex items-center justify-center gap-2 transition shadow-lg shadow-emerald-950/20 active:scale-[0.99]">
                    <i data-lucide="check-circle" class="w-5 h-5"></i> Finalizar Entrenamiento
                </button>
            </div>
        </main>
    </div>

    <!-- MODAL SIMPLE PARA AGREGAR EJERCICIO -->
    <div id="modal-ejercicio" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 w-full max-w-sm rounded-2xl p-5 shadow-2xl">
            <h3 class="text-base font-bold mb-3 text-slate-200">Nuevo Ejercicio</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-1">Nombre del Ejercicio</label>
                    <input type="text" id="input-nombre" placeholder="Ej. Press de Banca" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2.5 text-slate-200 text-sm focus:outline-none focus:border-indigo-500">
                </div>
                <div class="flex gap-2 pt-1">
                    <button onclick="cerrarModal()" class="flex-1 bg-slate-800 text-slate-300 text-xs font-bold py-2.5 rounded-xl">Cancelar</button>
                    <button onclick="agregarEjercicio()" class="flex-1 bg-indigo-600 text-white text-xs font-bold py-2.5 rounded-xl shadow-md">Agregar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- PROGRAMACIÓN LOGICA (JAVASCRIPT) -->
    <script>
        // --- BASE DE DATOS LOCAL ---
        let estado = JSON.parse(localStorage.getItem('gym_personal_state')) || {
            proximoDia: 1,      // El recordatorio de qué día te toca
            diaSeleccionado: 1, // El día que estás viendo en pantalla
            rutinas: {
                1: [], 2: [], 3: [], 4: [], 5: [], 6: [] // Soporte para los 6 días
            }
        };

        function guardarEnMemoria() {
            localStorage.setItem('gym_personal_state', JSON.stringify(estado));
            renderizar();
        }

        // --- MANEJO DEL MODAL ---
        function abrirModal() { document.getElementById('modal-ejercicio').classList.remove('hidden'); document.getElementById('input-nombre').focus(); }
        function cerrarModal() { document.getElementById('modal-ejercicio').classList.add('hidden'); document.getElementById('input-nombre').value = ''; }

        // --- LÓGICA DE DÍAS Y EJERCICIOS ---
        function cambiarDia(dia) {
            estado.diaSeleccionado = dia;
            guardarEnMemoria();
        }

        function irADiaSiguiente() {
            estado.diaSeleccionado = estado.proximoDia;
            guardarEnMemoria();
        }

        function agregarEjercicio() {
            const nombre = document.getElementById('input-nombre').value.trim();
            if (!nombre) return alert('Por favor, escribe el nombre del ejercicio.');

            // Creamos las 4 series vacías fijas por defecto
            let series = [
                { peso: '', reps: '' },
                { peso: '', reps: '' },
                { peso: '', reps: '' },
                { peso: '', reps: '' }
            ];

            estado.rutinas[estado.diaSeleccionado].push({
                id: Date.now(),
                nombre: nombre,
                series: series
            });

            cerrarModal();
            guardarEnMemoria();
        }

        function eliminarEjercicio(id) {
            if(confirm("¿Eliminar este ejercicio?")) {
                estado.rutinas[estado.diaSeleccionado] = estado.rutinas[estado.diaSeleccionado].filter(ex => ex.id !== id);
                guardarEnMemoria();
            }
        }

        function actualizarDatoSerie(ejercicioId, indexSerie, campo, valor) {
            const ejercicio = estado.rutinas[estado.diaSeleccionado].find(ex => ex.id === ejercicioId);
            if (ejercicio) {
                ejercicio.series[indexSerie][campo] = valor;
                // Guardamos en tiempo real en la memoria para no perder datos al escribir
                localStorage.setItem('gym_personal_state', JSON.stringify(estado));
            }
        }

        function finalizarEntrenamiento() {
            const ejerciciosActuales = estado.rutinas[estado.diaSeleccionado];
            if (ejerciciosActuales.length === 0) {
                alert("Agrega al menos un ejercicio antes de finalizar.");
                return;
            }

            // Calculamos el próximo día en base al que acabamos de terminar (Ciclo del 1 al 6)
            let siguiente = estado.diaSeleccionado + 1;
            if (siguiente > 6) siguiente = 1;

            estado.proximoDia = siguiente;
            estado.diaSeleccionado = siguiente; // Te mueve automáticamente al día que te va a tocar mañana

            alert(`¡Entrenamiento guardado con éxito! Mañana te toca el Día ${siguiente}.`);
            guardarEnMemoria();
        }

        // --- DIBUJAR LA INTERFAZ ---
        function renderizar() {
            // Update del banner superior de recordatorio
            document.getElementById('reminder-text').innerText = `Día ${estado.proximoDia}`;
            document.getElementById('selected-day-title').innerText = `Día ${estado.diaSeleccionado}`;

            // Dibujar las pestañas de los 6 días
            const tabsContainer = document.getElementById('days-tabs-container');
            tabsContainer.innerHTML = '';
            for (let i = 1; i <= 6; i++) {
                const esActivo = estado.diaSeleccionado === i;
                const esElQueToca = estado.proximoDia === i;
                
                const boton = document.createElement('button');
                boton.className = `py-2.5 rounded-xl font-bold text-xs transition flex flex-col items-center justify-center border ${
                    esActivo 
                    ? 'bg-indigo-600 text-white border-indigo-400 shadow-md shadow-indigo-600/10' 
                    : 'bg-slate-900 text-slate-400 border-slate-800/80 hover:text-slate-200'
                }`;
                
                boton.innerHTML = `
                    <span>Día ${i}</span>
                    ${esElQueToca ? '<span class="text-[8px] text-indigo-400 font-extrabold tracking-wide mt-0.5">TOCA</span>' : ''}
                `;
                boton.onclick = () => cambiarDia(i);
                tabsContainer.appendChild(boton);
            }

            // Dibujar los ejercicios del día seleccionado
            const containerEjercicios = document.getElementById('exercises-container');
            containerEjercicios.innerHTML = '';

            const listaEjercicios = estado.rutinas[estado.diaSeleccionado];

            if (listaEjercicios.length === 0) {
                containerEjercicios.innerHTML = `
                    <div class="py-10 text-center border border-dashed border-slate-800 rounded-2xl bg-slate-900/10">
                        <p class="text-xs text-slate-500">No hay ejercicios para este día todavía.</p>
                    </div>
                `;
            } else {
                listaEjercicios.forEach(ejercicio => {
                    const card = document.createElement('div');
                    card.className = "bg-slate-900 border border-slate-800/60 rounded-2xl p-4 space-y-3 shadow-md";

                    // Cabecera del ejercicio con su título y botón de borrar
                    let htmlCard = `
                        <div class="flex justify-between items-center border-b border-slate-800/60 pb-2">
                            <h4 class="font-bold text-sm text-slate-200 tracking-tight">${ejercicio.nombre}</h4>
                            <button onclick="eliminarEjercicio(${ejercicio.id})" class="text-slate-500 hover:text-rose-400 transition p-1">
                                <i data-lucide="x" class="w-4 h-4"></i>
                            </button>
                        </div>
                        <div class="space-y-2">
                            <div class="grid grid-cols-12 gap-2 text-[9px] font-bold text-slate-500 uppercase tracking-wider text-center px-1">
                                <span class="col-span-2 text-left">Serie</span>
                                <span class="col-span-5">Peso</span>
                                <span class="col-span-5">Reps</span>
                            </div>
                    `;

                    // Las 4 series fijas con inputs independientes
                    ejercicio.series.forEach((serie, idx) => {
                        htmlCard += `
                            <div class="grid grid-cols-12 gap-2 items-center">
                                <span class="col-span-2 text-xs font-semibold text-slate-500 text-center">#${idx + 1}</span>
                                <input type="text" placeholder="Ej. 60kg" value="${serie.peso}" 
                                    oninput="actualizarDatoSerie(${ejercicio.id}, ${idx}, 'peso', this.value)"
                                    class="col-span-5 bg-slate-950 border border-slate-800 rounded-xl py-1.5 text-center text-xs text-slate-200 focus:outline-none focus:border-indigo-500/50 font-medium">
                                <input type="number" placeholder="Reps" value="${serie.reps}" 
                                    oninput="actualizarDatoSerie(${ejercicio.id}, ${idx}, 'reps', this.value)"
                                    class="col-span-5 bg-slate-950 border border-slate-800 rounded-xl py-1.5 text-center text-xs text-slate-200 focus:outline-none focus:border-indigo-500/50 font-medium">
                            </div>
                        `;
                    });

                    htmlCard += `</div>`;
                    card.innerHTML = htmlCard;
                    containerEjercicios.appendChild(card);
                });
            }

            // Refrescar los iconos visuales
            lucide.createIcons();
        }

        // Ejecutar al abrir la app
        document.addEventListener('DOMContentLoaded', () => {
            renderizer();
        });
    </script>
</body>
</html>
