<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PowerLog - Mi Perfil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen p-4 flex flex-col justify-start">

    <div class="space-y-6 w-full">
        <div class="flex items-center justify-between border-b-2 border-slate-200 pb-4">
            <button type="button" onclick="window.location.href='index.html'" class="text-base font-black text-slate-500 flex items-center gap-2 py-2">
                <i data-lucide="arrow-left" class="w-6 h-6"></i> Salir
            </button>
            <div class="text-right">
                <span class="text-[11px] font-black text-blue-600 uppercase tracking-wider block">Perfil activo</span>
                <h2 id="nombre-perfil-activo" class="text-2xl font-black text-slate-800">---</h2>
            </div>
        </div>

        <div class="space-y-1">
            <h3 class="text-xl font-black text-slate-700">Mis Rutinas</h3>
            <p class="text-sm text-slate-400 font-medium">Elige el día que vas a organizar o entrenar</p>
        </div>

        <div class="space-y-3 w-full" id="lista-dias-container"></div>

        <div class="space-y-3 pt-6 border-t-2 border-slate-200 w-full">
            <div class="flex items-center justify-between">
                <h3 class="text-xs font-black uppercase tracking-wider text-slate-400 flex items-center gap-1.5">
                    <i data-lucide="history" class="w-4 h-4"></i> Registros de este perfil
                </h3>
                <button type="button" onclick="limpiarHistorial()" class="text-xs font-bold text-rose-500 bg-rose-50 px-2 py-1 rounded-lg border border-rose-100">
                    Limpiar
                </button>
            </div>
            <div id="contenedor-historial-usuario" class="space-y-2 max-h-80 overflow-y-auto pr-1"></div>
        </div>
    </div>

    <script>
        const usuario = localStorage.getItem('usuario_actual') || "Nico V";
        
        function inicializarDatos() { return { rutinas: { 1: [], 2: [], 3: [], 4: [], 5: [], 6: [] } }; }
        let db = JSON.parse(localStorage.getItem('gym_step_by_step_db')) || {};
        if (!db[usuario]) db[usuario] = inicializarDatos();

        document.getElementById('nombre-perfil-activo').innerText = usuario;

        // Cargar Días Gigantes
        const container = document.getElementById('lista-dias-container');
        for (let i = 1; i <= 6; i++) {
            const cant = db[usuario].rutinas[i] ? db[usuario].rutinas[i].length : 0;
            const btn = document.createElement('button');
            btn.className = "w-full bg-white border-2 border-slate-200 text-left font-black py-5 px-6 rounded-2xl flex items-center justify-between text-xl text-slate-800 mb-2 shadow-sm active:bg-slate-100";
            btn.innerHTML = `
                <div class="flex items-center gap-3">
                    <div class="w-4 h-4 rounded-full bg-blue-600"></div>
                    <span>Día ${i}</span>
                </div>
                <span class="text-sm text-slate-400 font-black">${cant > 0 ? cant + ' ej.' : 'Vacío'}</span>
            `;
            btn.onclick = function() {
                localStorage.setItem('dia_actual', i);
                window.location.href = 'dia.html';
            };
            container.appendChild(btn);
        }

        // Historial
        let historial = JSON.parse(localStorage.getItem('gym_logs_historial_v5')) || [];
        const contenedorHistorial = document.getElementById('contenedor-historial-usuario');
        const filtrados = historial.filter(l => l.usuario === usuario);
        
        if(filtrados.length === 0) {
            contenedorHistorial.innerHTML = `<div class="p-4 text-center border border-dashed border-slate-200 bg-white text-sm text-slate-400 rounded-xl">No hay registros aún.</div>`;
        } else {
            filtrados.forEach(log => {
                contenedorHistorial.innerHTML += `
                    <div class="bg-white border border-slate-200 rounded-xl p-3 shadow-sm text-base">
                        <div class="flex justify-between text-[11px] text-slate-400 font-bold"><span>[${log.fecha}]</span><span class="uppercase font-black text-slate-500">${log.musculo}</span></div>
                        <div class="text-slate-800 font-black">${log.ejercicio}: <span class="text-emerald-600">${log.peso}kg</span> x <span class="text-blue-600">${log.reps} reps</span></div>
                    </div>`;
            });
        }

        function limpiarHistorial() {
            if(confirm('¿Borrar registros?')) {
                historial = historial.filter(l => l.usuario !== usuario);
                localStorage.setItem('gym_logs_historial_v5', JSON.stringify(historial));
                window.location.reload();
            }
        }
        document.addEventListener('DOMContentLoaded', () => { if (window.lucide) lucide.createIcons(); });
    </script>
</body>
</html>
