<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PowerLog - Registro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen p-4 flex flex-col justify-start max-w-md mx-auto">

    <div class="space-y-6 w-full">
        <div class="flex items-center justify-between border-b-2 border-slate-200 pb-4">
            <button type="button" onclick="window.location.href='./perfil.html'" class="text-base font-black text-slate-500 flex items-center gap-2 py-2">
                <i data-lucide="arrow-left" class="w-6 h-6"></i> Volver al Perfil
            </button>
            <h2 class="text-xl font-black text-slate-800 flex items-center gap-2">
                <i data-lucide="calendar-days" class="text-blue-600"></i> Historial Calendario
            </h2>
        </div>

        <div class="bg-white border-2 border-slate-200 rounded-3xl p-4 shadow-sm space-y-3">
            <div class="text-center font-black text-lg text-slate-700 uppercase py-1" id="mes-titulo">Mes</div>
            <div class="grid grid-cols-7 gap-1 text-center text-xs font-black text-slate-400 uppercase">
                <span>D</span><span>L</span><span>M</span><span>M</span><span>J</span><span>V</span><span>S</span>
            </div>
            <div class="grid grid-cols-7 gap-1.5" id="celdas-calendario"></div>
        </div>

        <div class="space-y-2">
            <h3 class="text-xs font-black uppercase tracking-wider text-slate-400" id="titulo-detalle">Toca un día marcado en azul</h3>
            <div id="lista-detalles-dia" class="space-y-2 max-h-64 overflow-y-auto"></div>
        </div>
    </div>

    <script>
        const usuario = localStorage.getItem('powerlog_usuario_actual');
        let logsHistorial = JSON.parse(localStorage.getItem('powerlog_history_v9')) || [];

        function construirCalendario() {
            const fechaActual = new Date();
            const nombresMeses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            document.getElementById('mes-titulo').innerText = `${nombresMeses[fechaActual.getMonth()]} ${fechaActual.getFullYear()}`;

            const contenedorCeldas = document.getElementById('celdas-calendario');
            contenedorCeldas.innerHTML = '';

            const año = fechaActual.getFullYear();
            const mes = fechaActual.getMonth();
            const indexPrimerDia = new Date(año, mes, 1).getDay();
            const totalDiasMes = new Date(año, mes + 1, 0).getDate();

            for (let i = 0; i < indexPrimerDia; i++) {
                contenedorCeldas.appendChild(document.createElement('div'));
            }

            for (let dia = 1; dia <= totalDiasMes; dia++) {
                const botonCelda = document.createElement('button');
                botonCelda.type = "button";
                
                const diaPadded = String(dia).padStart(2, '0');
                const mesPadded = String(mes + 1).padStart(2, '0');
                const llaveFecha = `${año}-${mesPadded}-${diaPadded}`;

                const registroExistente = logsHistorial.some(log => log.fechaKey === llaveFecha && log.usuario === usuario);

                botonCelda.className = `w-full aspect-square text-sm font-black rounded-xl flex items-center justify-center active:scale-95 transition-all ${registroExistente ? 'bg-blue-600 text-white shadow-md' : 'bg-slate-100 text-slate-700'}`;
                botonCelda.innerText = dia;

                botonCelda.onclick = function() { desplegarResumenDiaCalendario(llaveFecha, dia); };
                contenedorCeldas.appendChild(botonCelda);
            }
        }

        function desplegarResumenDiaCalendario(llaveFecha, nroDia) {
            document.getElementById('titulo-detalle').innerText = `Entrenamientos del día ${nroDia}:`;
            const listaDetalles = document.getElementById('lista-detalles-dia');
            listaDetalles.innerHTML = '';

            const filtrados = logsHistorial.filter(log => log.fechaKey === llaveFecha && log.usuario === usuario);

            if (filtrados.length === 0) {
                listaDetalles.innerHTML = `<div class="p-4 text-center border bg-white rounded-xl text-sm text-slate-400 font-medium">No se registraron entrenamientos este día.</div>`;
                return;
            }

            let agrupado = {};
            filtrados.forEach(log => {
                if (!agrupado[log.ejercicio]) {
                    agrupado[log.ejercicio] = { musculo: log.musculo, series: [] };
                }
                agrupado[log.ejercicio].series.push(log);
            });

            Object.keys(agrupado).forEach(nombre => {
                const item = agrupado[nombre];
                const tarj = document.createElement('div');
                tarj.className = "bg-white border border-slate-200 rounded-2xl p-4 shadow-sm space-y-1.5";
                
                let lineasSeries = '';
                item.series.forEach(s => {
                    lineasSeries += `<div class="text-sm text-slate-600">Serie #${s.serie}: <span class="font-black text-slate-800">${s.peso}kg</span> x <span class="font-black text-blue-600">${s.reps} reps</span></div>`;
                });

                tarj.innerHTML = `
                    <div class="flex justify-between items-center border-b pb-1 mb-1">
                        <span class="font-black text-base text-slate-800">${nombre}</span>
                        <span class="text-[10px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded font-black uppercase">${item.musculo}</span>
                    </div>
                    <div class="space-y-0.5">${lineasSeries}</div>`;
                listaDetalles.appendChild(tarj);
            });
        }

        construirCalendario();
        document.addEventListener('DOMContentLoaded', () => { if (window.lucide) lucide.createIcons(); });
    </script>
</body>
</html>
